<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FixMyArea — AI-Powered Local Issue Reporting</title>
    <meta name="description"
        content="FixMyArea is an AI-powered platform that lets citizens report local issues like potholes, garbage, broken street lights, and water leaks directly to local authorities." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#1A6B3C',
                            50: '#E8F5EE',
                            100: '#C5E6D2',
                            200: '#9ED4B2',
                            300: '#76C292',
                            400: '#4DAF71',
                            500: '#2E9455',
                            600: '#1A6B3C',
                            700: '#145430',
                            800: '#0E3D23',
                            900: '#072616',
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'fade-up': 'fadeUp 0.6s ease-out forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4,0,0.6,1) infinite',
                    },
                    keyframes: {
                        fadeUp: {
                            '0%': { opacity: '0', transform: 'translateY(24px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                    },
                },
            },
        };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        * {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
        }

        .hero-gradient {
            background: linear-gradient(135deg, #E8F5EE 0%, #ffffff 50%, #C5E6D2 100%);
        }

        .card-hover {
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .card-hover:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(26, 107, 60, 0.12);
        }

        .btn-primary {
            background: #1A6B3C;
            transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
        }

        .btn-primary:hover {
            background: #145430;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(26, 107, 60, 0.35);
        }

        .btn-outline {
            border: 2px solid #1A6B3C;
            color: #1A6B3C;
            transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease;
        }

        .btn-outline:hover {
            background: #1A6B3C;
            color: white;
            transform: translateY(-2px);
        }

        .step-connector::after {
            content: '';
            position: absolute;
            top: 28px;
            left: calc(50% + 48px);
            width: calc(100% - 96px);
            height: 2px;
            background: linear-gradient(90deg, #1A6B3C, #9ED4B2);
        }

        @media (max-width: 768px) {
            .step-connector::after {
                display: none;
            }
        }

        .nav-link {
            transition: color 0.2s ease;
        }

        .nav-link:hover {
            color: #1A6B3C;
        }

        .category-card {
            transition: all 0.25s ease;
        }

        .category-card:hover {
            background: #1A6B3C;
            color: white;
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(26, 107, 60, 0.25);
        }

        .category-card:hover .cat-icon {
            color: white;
        }

        .category-card:hover .cat-label {
            color: white;
        }

        .floating-badge {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        .section-fade {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .section-fade.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── Auth Modal ── */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            animation: bdFadeIn 0.2s ease both;
        }

        @keyframes bdFadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modal-card {
            background: white;
            border-radius: 1.5rem;
            width: 100%;
            max-width: 440px;
            padding: 2.25rem 2rem;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.18);
            animation: cardSlideUp 0.3s cubic-bezier(0.34, 1.2, 0.64, 1) both;
            position: relative;
        }

        @keyframes cardSlideUp {
            from {
                opacity: 0;
                transform: translateY(28px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .auth-field {
            width: 100%;
            padding: 0.65rem 0.9rem 0.65rem 2.5rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 0.7rem;
            font-size: 0.9rem;
            color: #1f2937;
            background: #f9fafb;
            outline: none;
            font-family: inherit;
            transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
        }

        .auth-field:focus {
            border-color: #1A6B3C;
            box-shadow: 0 0 0 3px rgba(26, 107, 60, 0.12);
            background: white;
        }

        .auth-field.field-error {
            border-color: #ef4444;
        }

        .auth-field::placeholder {
            color: #9ca3af;
        }

        .modal-submit {
            width: 100%;
            padding: 0.8rem;
            background: #1A6B3C;
            color: white;
            border: none;
            border-radius: 0.8rem;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.18s, transform 0.15s, box-shadow 0.18s;
        }

        .modal-submit:hover {
            background: #145430;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(26, 107, 60, 0.28);
        }

        .role-pill {
            flex: 1;
            padding: 0.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            font-family: inherit;
            transition: all 0.15s;
        }

        .role-pill.active {
            background: #1A6B3C;
            color: white;
        }

        .role-pill.inactive {
            background: transparent;
            color: #6b7280;
        }

        .role-pill.inactive:hover {
            background: #f3f4f6;
            color: #374151;
        }

        .modal-link {
            color: #1A6B3C;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        .modal-link:hover {
            text-decoration: underline;
        }

        /* ── Report Modal extras ── */
        .report-progress-bar {
            height: 4px;
            border-radius: 999px;
            background: #e5e7eb;
            overflow: hidden;
        }

        .report-progress-fill {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, #1A6B3C, #2E9455);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cat-pick {
            border: 2px solid #e5e7eb;
            border-radius: 0.85rem;
            padding: 0.65rem 0.5rem;
            cursor: pointer;
            transition: all 0.18s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.35rem;
            background: #f9fafb;
            font-size: 0.75rem;
            font-weight: 600;
            color: #6b7280;
        }

        .cat-pick:hover {
            border-color: #1A6B3C;
            background: #E8F5EE;
            color: #1A6B3C;
        }

        .cat-pick.selected {
            border-color: #1A6B3C;
            background: #1A6B3C;
            color: white;
            box-shadow: 0 4px 12px rgba(26, 107, 60, 0.25);
        }

        .drop-zone {
            border: 2px dashed #d1d5db;
            border-radius: 1rem;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.18s, background 0.18s;
            background: #f9fafb;
        }

        .drop-zone:hover,
        .drop-zone.drag-over {
            border-color: #1A6B3C;
            background: #E8F5EE;
        }

        .report-step {
            animation: stepIn 0.3s cubic-bezier(0.34, 1.1, 0.64, 1) both;
        }

        @keyframes stepIn {
            from {
                opacity: 0;
                transform: translateX(18px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        .report-textarea {
            width: 100%;
            padding: 0.65rem 0.9rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 0.7rem;
            font-size: 0.9rem;
            color: #1f2937;
            background: #f9fafb;
            outline: none;
            font-family: inherit;
            resize: vertical;
            min-height: 90px;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .report-textarea:focus {
            border-color: #1A6B3C;
            box-shadow: 0 0 0 3px rgba(26, 107, 60, 0.10);
            background: white;
        }

        .modal-card-wide {
            background: white;
            border-radius: 1.5rem;
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2rem 2rem 2.25rem;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.18);
            animation: cardSlideUp 0.3s cubic-bezier(0.34, 1.2, 0.64, 1) both;
            position: relative;
        }

        /* ── View Issues Page ── */
        .issues-page {
            min-height: 100vh;
            background: #f8fafc;
            padding-top: 64px;
            /* navbar height */
        }

        .issues-tab {
            padding: 0.55rem 1.4rem;
            border-radius: 0.6rem;
            font-weight: 700;
            font-size: 0.875rem;
            cursor: pointer;
            border: none;
            font-family: inherit;
            transition: all 0.18s ease;
        }

        .issues-tab.active {
            background: #1A6B3C;
            color: white;
            box-shadow: 0 4px 14px rgba(26, 107, 60, 0.25);
        }

        .issues-tab.inactive {
            background: transparent;
            color: #6b7280;
        }

        .issues-tab.inactive:hover {
            background: #f3f4f6;
            color: #374151;
        }

        /* Map */
        .sim-map {
            background: #e8f5ee;
            border-radius: 1.25rem;
            position: relative;
            overflow: hidden;
            height: 500px;
            border: 1.5px solid #c3e6d0;
        }

        .map-pin {
            position: absolute;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.22);
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            z-index: 10;
        }

        .map-pin:hover {
            transform: scale(1.35);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.28);
        }

        .pin-popup {
            position: absolute;
            background: white;
            border-radius: 0.85rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.14);
            padding: 0.85rem 1rem;
            min-width: 190px;
            z-index: 20;
            animation: cardSlideUp 0.2s ease both;
            border: 1.5px solid #e5e7eb;
        }

        /* List */
        .issue-card {
            background: white;
            border-radius: 1rem;
            padding: 1.1rem 1.25rem;
            border: 1.5px solid #e5e7eb;
            transition: box-shadow 0.2s ease, transform 0.2s ease;
        }

        .issue-card:hover {
            box-shadow: 0 8px 28px rgba(26, 107, 60, 0.10);
            transform: translateY(-2px);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 700;
        }

        .filter-select {
            padding: 0.45rem 0.9rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 0.6rem;
            font-size: 0.85rem;
            color: #374151;
            background: white;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            transition: border-color 0.15s;
        }

        .filter-select:focus {
            border-color: #1A6B3C;
        }

        .upvote-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border: 1.5px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            background: white;
            font-family: inherit;
            transition: all 0.15s;
            color: #6b7280;
        }

        .upvote-btn:hover,
        .upvote-btn.voted {
            border-color: #1A6B3C;
            color: #1A6B3C;
            background: #E8F5EE;
        }

        .my-reports-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 1rem;
            border-radius: 0.5rem;
            border: 1.5px solid #1A6B3C;
            color: #1A6B3C;
            font-size: 0.875rem;
            font-weight: 700;
            font-family: inherit;
            background: transparent;
            cursor: pointer;
            transition: background 0.15s ease, box-shadow 0.15s ease;
        }

        .my-reports-btn:hover {
            background: #1A6B3C;
            color: white;
            transform: translateY(-2px);
        }

        /* ── My Reports Page ── */
        .my-reports-page {
            min-height: 100vh;
            background: #f8fafc;
            padding-top: 64px;
        }

        /* ── Report Card ── */
        .my-report-card {
            background: white;
            border-radius: 1.25rem;
            padding: 1.25rem 1.5rem;
            border: 1.5px solid #e5e7eb;
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .my-report-card:hover {
            box-shadow: 0 8px 28px rgba(26, 107, 60, 0.10);
            border-color: #c5e6d2;
        }

        /* ── Photo placeholder ── */
        .photo-placeholder {
            width: 72px;
            height: 72px;
            min-width: 72px;
            border-radius: 1rem;
            background: #E8F5EE;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid #c5e6d2;
        }

        /* ── Horizontal Step Tracker ── */
        .step-track {
            display: flex;
            align-items: flex-start;
            margin-top: 1rem;
            padding-top: 0.75rem;
            border-top: 1px solid #f0f0f0;
        }

        .step-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.35rem;
            flex-shrink: 0;
        }

        .step-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .step-dot.done {
            background: #1A6B3C;
            color: white;
        }

        .step-dot.active {
            background: #1A6B3C;
            color: white;
            box-shadow: 0 0 0 4px rgba(26, 107, 60, 0.18);
        }

        .step-dot.idle {
            background: #e5e7eb;
            color: #9ca3af;
        }

        .step-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-align: center;
            max-width: 52px;
            line-height: 1.2;
            white-space: nowrap;
        }

        .step-label.done,
        .step-label.active {
            color: #1A6B3C;
        }

        .step-label.idle {
            color: #9ca3af;
        }

        .step-line {
            flex: 1;
            height: 2px;
            margin-top: 13px;
            background: #e5e7eb;
            transition: background 0.2s ease;
        }

        .step-line.done {
            background: #1A6B3C;
        }

        /* ── Admin Dashboard ── */
        .admin-page {
            min-height: 100vh;
            background: #f8fafc;
            padding-top: 64px;
        }

        .admin-tab-bar {
            display: flex;
            gap: 0;
            border-bottom: 2px solid #e5e7eb;
            background: white;
        }

        .admin-tab {
            padding: 0.85rem 1.5rem;
            font-size: 0.875rem;
            font-weight: 700;
            border: none;
            background: transparent;
            cursor: pointer;
            font-family: inherit;
            color: #6b7280;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: color 0.15s, border-color 0.15s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .admin-tab.active {
            color: #1A6B3C;
            border-bottom-color: #1A6B3C;
        }

        .admin-tab:hover:not(.active) {
            color: #374151;
            background: #f9fafb;
        }

        /* Stat cards */
        .stat-card {
            background: white;
            border-radius: 1.25rem;
            padding: 1.5rem;
            border: 1.5px solid #e5e7eb;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: box-shadow 0.2s ease;
        }

        .stat-card:hover {
            box-shadow: 0 8px 24px rgba(26, 107, 60, 0.08);
        }

        .stat-icon-wrap {
            width: 52px;
            height: 52px;
            border-radius: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* Bar chart */
        .bar-chart-wrap {
            background: white;
            border-radius: 1.25rem;
            padding: 1.5rem;
            border: 1.5px solid #e5e7eb;
        }

        .bar-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .bar-label {
            width: 100px;
            font-size: 0.78rem;
            font-weight: 600;
            color: #374151;
            text-align: right;
            flex-shrink: 0;
        }

        .bar-track {
            flex: 1;
            height: 22px;
            background: #f0fdf4;
            border-radius: 6px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 6px;
            background: linear-gradient(90deg, #1A6B3C, #2E9455);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 6px;
            font-size: 0.68rem;
            font-weight: 700;
            color: white;
            min-width: 24px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Admin table */
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }

        .admin-table th {
            background: #f8fafc;
            padding: 0.7rem 1rem;
            text-align: left;
            font-size: 0.72rem;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border-bottom: 1.5px solid #e5e7eb;
        }

        .admin-table td {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid #f3f4f6;
            color: #374151;
            vertical-align: middle;
        }

        .admin-table tr:last-child td {
            border-bottom: none;
        }

        .admin-table tr:hover td {
            background: #f9fafb;
        }

        .admin-table-wrap {
            background: white;
            border-radius: 1.25rem;
            border: 1.5px solid #e5e7eb;
            overflow: hidden;
        }

        /* Status badge */
        .adm-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 700;
        }

        /* Status select in table */
        .status-select {
            border: 1.5px solid #e5e7eb;
            border-radius: 0.5rem;
            padding: 0.3rem 0.5rem;
            font-size: 0.78rem;
            color: #374151;
            background: white;
            font-family: inherit;
            cursor: pointer;
            outline: none;
        }

        .status-select:focus {
            border-color: #1A6B3C;
        }

        /* Flagged card */
        .flagged-card {
            background: white;
            border-radius: 1.25rem;
            padding: 1.25rem 1.5rem;
            border: 1.5px solid #fecaca;
            transition: box-shadow 0.2s ease;
        }

        .flagged-card:hover {
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.08);
        }

        /* Confidence bar */
        .conf-track {
            height: 8px;
            background: #f3f4f6;
            border-radius: 999px;
            overflow: hidden;
            flex: 1;
        }

        .conf-fill {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, #ef4444, #f97316);
        }

        /* Admin filter bar */
        .admin-filter-bar {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
            padding: 1rem 1.25rem;
            background: #f8fafc;
            border-bottom: 1.5px solid #e5e7eb;
        }
    </style>
</head>

<body class="bg-white text-gray-800 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /* ── tiny lucide helper ── */
        function Icon({ name, size = 24, className = '' }) {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    ref.current.innerHTML = '';
                    const icon = lucide.createElement(lucide[name] || lucide['Circle']);
                    icon.setAttribute('width', size);
                    icon.setAttribute('height', size);
                    ref.current.appendChild(icon);
                }
            }, [name, size]);
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} />;
        }

        /* ── intersection observer hook ── */
        function useFadeIn() {
            const ref = useRef(null);
            useEffect(() => {
                const el = ref.current;
                if (!el) return;
                const obs = new IntersectionObserver(
                    ([entry]) => { if (entry.isIntersecting) { el.classList.add('visible'); obs.disconnect(); } },
                    { threshold: 0.15 }
                );
                obs.observe(el);
                return () => obs.disconnect();
            }, []);
            return ref;
        }

        /* ─────────────── AUTH MODAL ─────────────── */
        function AuthModal({ initialView, onClose, onLogin }) {
            const [view, setView] = useState(initialView); // 'login' | 'register'
            const [success, setSuccess] = useState(false);
            const [form, setForm] = useState({ name: '', email: '', password: '', confirm: '', role: 'citizen' });
            const [errors, setErrors] = useState({});
            const [loading, setLoading] = useState(false);

            const set = (field) => (e) => setForm(f => ({ ...f, [field]: e.target.value }));

            // Close on backdrop click
            const handleBackdrop = (e) => { if (e.target === e.currentTarget) onClose(); };

            // Close on Escape
            useEffect(() => {
                const handler = (e) => { if (e.key === 'Escape') onClose(); };
                document.addEventListener('keydown', handler);
                return () => document.removeEventListener('keydown', handler);
            }, []);

            const switchView = (v) => { setErrors({}); setSuccess(false); setForm({ name: '', email: '', password: '', confirm: '', role: 'citizen' }); setView(v); };

            const validate = () => {
                const e = {};
                if (view === 'register' && !form.name.trim()) e.name = 'Full name is required';
                if (!form.email.trim()) e.email = 'Email is required';
                else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = 'Enter a valid email address';
                if (!form.password) e.password = 'Password is required';
                else if (form.password.length < 6) e.password = 'Min. 6 characters required';
                if (view === 'register') {
                    if (!form.confirm) e.confirm = 'Please confirm your password';

            {

                status: 'Resolved',      // all steps done
                upvotes: 27,
            },
            {

                title: 'Street light out on Infantry Road',
                category: 'Street Light', catIcon: 'Lightbulb', catColor: '#d97706', catBg: '#fffbeb',
                date: '2026-03-08',
                location: 'Infantry Road, Bengaluru',
                status: 'AI Verified',   // Submitted → [AI Verified] → In Progress → Resolved

        const REPORT_STEPS = ['Submitted', 'AI Verified', 'In Progress', 'Resolved'];

        function StatusStepTracker({ status }) {
            const activeIdx = REPORT_STEPS.indexOf(status);
            return (
                <div className="step-track">
                    {REPORT_STEPS.map((step, i) => {
                        const state = i < activeIdx ? 'done' : i === activeIdx ? 'active' : 'idle';
                        return (

                                    <span className={`step-label ${state}`}>{step}</span>
                                </div>
                            </React.Fragment>

                    })}

        }

        function MyReports({ onBack }) {
            return (
                <div className="my-reports-page">
                    {/* Top bar */}
                    <div className="sticky top-16 z-40 bg-white border-b border-gray-100 shadow-sm">
                        <div className="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex items-center gap-4">
                            <button
                                onClick={onBack}
                                className="flex items-center gap-1.5 px-3 py-2 rounded-lg border-2 border-gray-200 text-gray-600 font-semibold text-sm hover:bg-gray-50 transition-colors"
                            >
                                <Icon name="ArrowLeft" size={16} className="text-gray-500" /> Back
                            </button>
                            <div className="flex items-center gap-3">
                                <h1 className="text-lg font-extrabold text-gray-900">My Reports</h1>

                                            <thead>
                                                <tr>
                                                    <th>ID</th><th>Title</th><th>Category</th><th>Location</th><th>Status</th><th>Date</th><th>Action</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {filtered.map(r => (
                                                    <tr key={r.id}>
                                                        <td><span className="font-mono text-xs text-gray-400">{r.id}</span></td>
                                                        <td><span className="font-semibold text-gray-800">{r.title}</span></td>
                                                        <td><span className="text-xs font-semibold text-gray-600">{r.category}</span></td>
                                                        <td><span className="text-gray-500">{r.location}</span></td>
                                                        <td><AdminBadge status={r.status} /></td>
                                                        <td><span className="text-gray-400 text-xs">{r.date}</span></td>
                                                        <td>
                                                            <select
                                                                value={r.status}
                                                                onChange={e => updateStatus(r.id, e.target.value)}
                                                                className="status-select"
                                                            >
                                                                <option>Pending</option>
                                                                <option>In Progress</option>
                                                                <option>Resolved</option>
                                                            </select>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ── TAB 3: FLAGGED REPORTS ── */}
                        {tab === 'flagged' && (
                            <div className="space-y-4">
                                {flagged.length === 0 ? (
                                    <div className="text-center py-16 text-gray-400">
                                        <Icon name="ShieldCheck" size={40} className="text-gray-200 mb-3" />
                                        <p className="font-semibold">No flagged reports — all clear!</p>
                                    </div>
                                ) : flagged.map(f => (
                                    <div key={f.id} className="flagged-card">
                                        <div className="flex items-start justify-between gap-3 mb-3">
                                            <div>
                                                <div className="flex items-center gap-2 mb-1">
                                                    <span className="inline-flex items-center gap-1 px-2 py-0.5 bg-red-50 text-red-600 text-xs font-bold rounded-full border border-red-100">
                                                        <Icon name="AlertTriangle" size={11} className="text-red-500" /> Suspicious
                                                    </span>
                                                    <span className="text-xs text-gray-400 font-mono">{f.id}</span>
                                                </div>
                                                <p className="font-bold text-gray-900 text-sm">{f.title}</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-2 mb-1 text-xs text-gray-500">
                                            <Icon name="Brain" size={13} className="text-red-400 shrink-0" />
                                            <span className="font-medium">{f.reason}</span>
                                        </div>
                                        <div className="flex items-center gap-3 mb-4 mt-2">
                                            <span className="text-xs font-semibold text-gray-500 shrink-0">AI Confidence</span>
                                            <div className="conf-track">
                                                <div className="conf-fill" style={{ width: `${f.confidence}%` }} />
                                            </div>
                                            <span className="text-xs font-bold text-red-600 shrink-0">{f.confidence}%</span>
                                        </div>
                                        <div className="flex gap-2">
                                            <button
                                                onClick={() => dismissFlagged(f.id)}
                                                className="flex-1 py-2 rounded-xl border-2 border-red-200 text-red-600 font-semibold text-sm hover:bg-red-50 transition-colors flex items-center justify-center gap-1.5"
                                            >
                                                <Icon name="X" size={14} className="text-red-500" /> Reject
                                            </button>
                                            <button
                                                onClick={() => dismissFlagged(f.id)}
                                                className="flex-1 py-2 rounded-xl btn-primary text-white font-semibold text-sm flex items-center justify-center gap-1.5"
                                            >
                                                <Icon name="Check" size={14} className="text-white" /> Approve
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* ── TAB 4: USERS ── */}
                        {tab === 'users' && (
                            <div className="admin-table-wrap">
                                <div style={{ overflowX: 'auto' }}>
                                    <table className="admin-table">
                                        <thead>
                                            <tr>
                                                <th>Name</th><th>Email</th><th>Role</th><th>Reports</th><th>Score</th><th>Status</th><th>Action</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {users.map(u => (
                                                <tr key={u.email}>
                                                    <td>
                                                        <div className="flex items-center gap-2">
                                                            <div className="w-7 h-7 rounded-full bg-primary-100 flex items-center justify-center shrink-0">
                                                                <Icon name="User" size={13} className="text-primary-600" />
                                                            </div>
                                                            <span className="font-semibold text-gray-800">{u.name}</span>
                                                        </div>
                                                    </td>
                                                    <td><span className="text-gray-500 text-xs">{u.email}</span></td>
                                                    <td>
                                                        <span className="text-xs font-semibold px-2 py-0.5 rounded-full" style={u.role === 'Inspector' ? { background: '#ede9fe', color: '#7c3aed' } : { background: '#f3f4f6', color: '#6b7280' }}>
                                                            {u.role}
                                                        </span>
                                                    </td>
                                                    <td><span className="font-bold text-gray-700">{u.reports}</span></td>
                                                    <td>
                                                        <div className="flex items-center gap-2">
                                                            <div className="conf-track" style={{ maxWidth: 60 }}>
                                                                <div className="conf-fill" style={{ width: `${u.score}%`, background: u.score >= 80 ? 'linear-gradient(90deg,#1A6B3C,#2E9455)' : 'linear-gradient(90deg,#ef4444,#f97316)' }} />
                                                            </div>
                                                            <span className="text-xs font-bold text-gray-600">{u.score}</span>
                                                        </div>
                                                    </td>
                                                    <td>
                                                        <span className="adm-badge" style={u.status === 'Active' ? { background: '#f0fdf4', color: '#15803d' } : { background: '#fef2f2', color: '#dc2626' }}>
                                                            <span style={{ width: 6, height: 6, borderRadius: '50%', background: u.status === 'Active' ? '#16a34a' : '#ef4444', display: 'inline-block' }} />
                                                            {u.status}
                                                        </span>
                                                    </td>
                                                    <td>
                                                        <button
                                                            onClick={() => toggleUserFlag(u.email)}
                                                            className="flex items-center gap-1 px-3 py-1.5 rounded-lg border-2 text-xs font-bold transition-colors"
                                                            style={u.status === 'Flagged'
                                                                ? { borderColor: '#1A6B3C', color: '#1A6B3C' }
                                                                : { borderColor: '#fecaca', color: '#dc2626' }}
                                                        >
                                                            <Icon name={u.status === 'Flagged' ? 'ShieldCheck' : 'Flag'} size={12} className="text-current" />
                                                            {u.status === 'Flagged' ? 'Unflag' : 'Flag User'}
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* ── TAB 5: ANALYTICS ── */}
                        {tab === 'analytics' && (() => {
                            const lineData = [5, 8, 6, 11, 9, 14, 10];
                            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
                            const maxVal = Math.max(...lineData);
                            const W = 340, H = 140, PAD = 20;
                            const pts = lineData.map((v, i) => [
                                PAD + (i / (lineData.length - 1)) * (W - PAD * 2),
                                PAD + (1 - v / maxVal) * (H - PAD * 2)
                            ]);
                            const polyline = pts.map(p => p.join(',')).join(' ');
                            const area = `M${pts[0][0]},${pts[0][1]} ` +
                                pts.slice(1).map(p => `L${p[0]},${p[1]}`).join(' ') +
                                ` L${pts[pts.length - 1][0]},${H - PAD} L${pts[0][0]},${H - PAD} Z`;

                            const donutData = [
                                { label: 'Pending', pct: 35, color: '#ef4444' },
                                { label: 'In Progress', pct: 40, color: '#f97316' },
                                { label: 'Resolved', pct: 25, color: '#1A6B3C' },
                            ];
                            const r = 54, cx = 70, cy = 70, sw = 22;
                            const circ = 2 * Math.PI * r;
                            let cumOff = 0;
                            const arcs = donutData.map(d => {
                                const dash = (d.pct / 100) * circ;
                                const arc = { ...d, dash, gap: circ - dash, offset: cumOff };
                                cumOff += dash;
                                return arc;
                            });

                            const aiCards = [
                                { label: 'Total AI Checks', value: '1,843', pct: 100, color: '#1A6B3C', sub: 'all reports processed' },
                                { label: 'Flagged as Fake', value: '127', pct: 7, color: '#ef4444', sub: '6.9% of total' },
                                { label: 'Accuracy Rate', value: '96.4%', pct: 96, color: '#2E9455', sub: 'AI validation score' },
                            ];
                            const rr = 30, rcx = 40, rcy = 40, rStr = 7;
                            const rCirc = 2 * Math.PI * rr;

                            const topAreas = [
                                { area: 'MG Road, Bengaluru', count: 18, max: 18 },
                                { area: 'NH-48, Mumbai', count: 15, max: 18 },
                                { area: 'City Park, Pune', count: 12, max: 18 },
                                { area: 'Nehru Nagar, Chennai', count: 9, max: 18 },
                                { area: 'Sector 12, Hyderabad', count: 6, max: 18 },
                            ];

                            return (
                                <div className="space-y-6">

                                    {/* Row 1 — 3 quick-stat cards */}
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                        {[
                                            { label: 'Reports This Month', value: 24, icon: 'CalendarDays', bg: '#E8F5EE', color: '#1A6B3C' },
                                            { label: 'Avg. Resolution Time', value: '4.2 days', icon: 'Timer', bg: '#eff6ff', color: '#2563eb' },
                                            { label: 'Fake Reports Detected', value: 7, icon: 'ShieldAlert', bg: '#fef2f2', color: '#dc2626' },
                                        ].map(s => (
                                            <div key={s.label} className="stat-card">
                                                <div className="stat-icon-wrap" style={{ background: s.bg }}>
                                                    <Icon name={s.icon} size={24} style={{ color: s.color }} />
                                                </div>
                                                <div>
                                                    <p className="text-2xl font-extrabold text-gray-900">{s.value}</p>
                                                    <p className="text-xs font-semibold text-gray-500">{s.label}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    {/* Row 2 — SVG Line chart + SVG Donut chart */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

                                        {/* Line Chart */}
                                        <div className="bar-chart-wrap">
                                            <h3 className="text-sm font-extrabold text-gray-800 mb-3 flex items-center gap-2">
                                                <Icon name="TrendingUp" size={15} className="text-primary-600" /> Reports — Last 7 Days
                                            </h3>
                                            <svg width="100%" viewBox={`0 0 ${W} ${H + 24}`} style={{ overflow: 'visible' }}>
                                                {[0.25, 0.5, 0.75, 1].map(t => {
                                                    const gy = PAD + (1 - t) * (H - PAD * 2);
                                                    return <line key={t} x1={PAD} y1={gy} x2={W - PAD} y2={gy} stroke="#f0f0f0" strokeWidth="1" />;
                                                })}
                                                <path d={area} fill="rgba(26,107,60,0.08)" />
                                                <polyline points={polyline} fill="none" stroke="#1A6B3C" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
                                                {pts.map(([px, py], i) => <circle key={i} cx={px} cy={py} r="4" fill="white" stroke="#1A6B3C" strokeWidth="2.5" />)}
                                                {pts.map(([px], i) => <text key={i} x={px} y={H + 17} textAnchor="middle" fontSize="10" fill="#9ca3af" fontFamily="Inter,sans-serif" fontWeight="600">{days[i]}</text>)}
                                                {pts.map(([px, py], i) => <text key={i} x={px} y={py - 8} textAnchor="middle" fontSize="9" fill="#1A6B3C" fontFamily="Inter,sans-serif" fontWeight="700">{lineData[i]}</text>)}
                                            </svg>
                                        </div>

                                        {/* Donut Chart */}
                                        <div className="bar-chart-wrap">
                                            <h3 className="text-sm font-extrabold text-gray-800 mb-3 flex items-center gap-2">
                                                <Icon name="PieChart" size={15} className="text-primary-600" /> Status Breakdown
                                            </h3>
                                            <div className="flex items-center gap-6">
                                                <svg width="140" height="140" viewBox="0 0 140 140" style={{ flexShrink: 0 }}>
                                                    {arcs.map((arc, i) => (
                                                        <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={arc.color} strokeWidth={sw}
                                                            strokeDasharray={`${arc.dash} ${arc.gap}`} strokeDashoffset={-arc.offset}
                                                            style={{ transform: 'rotate(-90deg)', transformOrigin: `${cx}px ${cy}px` }} />
                                                    ))}
                                                    <text x={cx} y={cy - 4} textAnchor="middle" fontSize="18" fontWeight="800" fill="#1f2937" fontFamily="Inter,sans-serif">73</text>
                                                    <text x={cx} y={cy + 13} textAnchor="middle" fontSize="9" fill="#9ca3af" fontFamily="Inter,sans-serif" fontWeight="600">Total</text>
                                                </svg>
                                                <div className="space-y-3">
                                                    {donutData.map((d, i) => (
                                                        <div key={i} className="flex items-center gap-2">
                                                            <span style={{ width: 10, height: 10, borderRadius: '50%', background: d.color, display: 'inline-block', flexShrink: 0 }} />
                                                            <span className="text-xs font-semibold text-gray-600" style={{ minWidth: 80 }}>{d.label}</span>
                                                            <span className="text-xs font-extrabold text-gray-900">{d.pct}%</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Row 3 — Most Reported Areas */}
                                    <div className="bar-chart-wrap">
                                        <h3 className="text-sm font-extrabold text-gray-800 mb-4 flex items-center gap-2">
                                            <Icon name="MapPin" size={15} className="text-primary-600" /> Most Reported Areas
                                        </h3>
                                        {topAreas.map((a, i) => (
                                            <div key={i} className="flex items-center gap-3 mb-3">
                                                <span style={{ width: 20, height: 20, borderRadius: '50%', background: '#E8F5EE', color: '#1A6B3C', fontSize: '0.65rem', fontWeight: 800, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>{i + 1}</span>
                                                <span style={{ width: 160, fontSize: '0.78rem', fontWeight: 600, color: '#374151', flexShrink: 0 }}>{a.area}</span>
                                                <div className="bar-track"><div className="bar-fill" style={{ width: `${(a.count / a.max) * 100}%` }}>{a.count}</div></div>
                                            </div>
                                        ))}
                                    </div>

                                    {/* Row 4 — AI Performance */}
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                        {aiCards.map((c, i) => {
                                            const dFill = (c.pct / 100) * rCirc;
                                            return (
                                                <div key={i} className="stat-card" style={{ flexDirection: 'column', alignItems: 'center', textAlign: 'center', gap: '0.25rem' }}>
                                                    <svg width="80" height="80" viewBox="0 0 80 80" style={{ marginBottom: '0.25rem' }}>
                                                        <circle cx={rcx} cy={rcy} r={rr} fill="none" stroke="#f0f0f0" strokeWidth={rStr} />
                                                        <circle cx={rcx} cy={rcy} r={rr} fill="none" stroke={c.color} strokeWidth={rStr}
                                                            strokeDasharray={`${dFill} ${rCirc - dFill}`} strokeLinecap="round"
                                                            style={{ transform: 'rotate(-90deg)', transformOrigin: `${rcx}px ${rcy}px` }} />
                                                        <text x={rcx} y={rcy + 5} textAnchor="middle" fontSize="11" fontWeight="800" fill="#1f2937" fontFamily="Inter,sans-serif">{c.pct}%</text>
                                                    </svg>
                                                    <p className="text-lg font-extrabold text-gray-900">{c.value}</p>
                                                    <p className="text-xs font-bold text-gray-700">{c.label}</p>
                                                    <p className="text-xs text-gray-400">{c.sub}</p>
                                                </div>
                                            );
                                        })}
                                    </div>

                                </div>
                            );
                        })()}

                    </div>
                </div>
            );
        }

        /* ─────────────── APP ─────────────── */
        function App() {
            const [modalView, setModalView] = useState(null);
            const [reportOpen, setReportOpen] = useState(false);
            const [issuesOpen, setIssuesOpen] = useState(false);
            const [myReportsOpen, setMyReportsOpen] = useState(false);
            const [adminOpen, setAdminOpen] = useState(false);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [isAdmin, setIsAdmin] = useState(false);

            const openModal = (view) => { setModalView(view); document.body.style.overflow = 'hidden'; };
            const closeModal = () => { setModalView(null); document.body.style.overflow = ''; };
            const openReport = () => { setReportOpen(true); document.body.style.overflow = 'hidden'; };
            const closeReport = () => { setReportOpen(false); document.body.style.overflow = ''; };
            const openIssues = () => { setIssuesOpen(true); window.scrollTo(0, 0); };
            const closeIssues = () => { setIssuesOpen(false); };
            const openMyReports = () => { setMyReportsOpen(true); window.scrollTo(0, 0); };
            const closeMyReports = () => { setMyReportsOpen(false); };
            const openAdmin = () => { setAdminOpen(true); window.scrollTo(0, 0); };
            const closeAdmin = () => { setAdminOpen(false); };

            const handleLogin = (email, password) => {
                const admin = email === 'admin@fixmyarea.com' && password === 'admin123';
                setIsLoggedIn(true);
                setIsAdmin(admin);
                if (admin) { closeModal(); }
            };
            const handleDemoLogin = () => { setIsLoggedIn(true); setIsAdmin(false); };
            const handleLogout = () => { setIsLoggedIn(false); setIsAdmin(false); setAdminOpen(false); setMyReportsOpen(false); };

            const navbarProps = {
                onOpenModal: openModal,
                isLoggedIn,
                isAdmin,
                onOpenMyReports: openMyReports,
                onOpenAdmin: openAdmin,
                onDemoLogin: handleDemoLogin,
                onLogout: handleLogout,
            };

            if (adminOpen) {
                return (
                    <>
                        <Navbar {...navbarProps} />
                        <AdminDashboard onBack={closeAdmin} />
                    </>
                );
            }

            if (myReportsOpen) {
                return (
                    <>
                        <Navbar {...navbarProps} />
                        <MyReports onBack={closeMyReports} />
                    </>
                );
            }

            if (issuesOpen) {
                return (
                    <>
                        <Navbar {...navbarProps} />
                        <ViewIssues onBack={closeIssues} />
                    </>
                );
            }

            return (
                <>
                    <Navbar {...navbarProps} />
                    <main>
                        <Hero onOpenReport={openReport} onOpenIssues={openIssues} />
                        <HowItWorks />
                        <Features />
                        <IssueCategories />
                        <CTABanner onOpenIssues={openIssues} />
                    </main>
                    <Footer />
                    {modalView && <AuthModal initialView={modalView} onClose={closeModal} onLogin={handleLogin} />}
                    {reportOpen && <ReportModal onClose={closeReport} />}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
