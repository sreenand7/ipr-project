    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /* ── tiny lucide helper ── */
        function Icon({ name, size = 24, className = '' }) {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    ref.current.innerHTML = '';
                    const icon = lucide.createElement(lucide[name] || lucide['Circle']);
                    icon.setAttribute('width', size);
                    icon.setAttribute('height', size);
                    ref.current.appendChild(icon);
                }
            }, [name, size]);
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} />;
        }

        /* ── intersection observer hook ── */
        function useFadeIn() {
            const ref = useRef(null);
            useEffect(() => {
                const el = ref.current;
                if (!el) return;
                const obs = new IntersectionObserver(
                    ([entry]) => { if (entry.isIntersecting) { el.classList.add('visible'); obs.disconnect(); } },
                    { threshold: 0.15 }
                );
                obs.observe(el);
                return () => obs.disconnect();
            }, []);
            return ref;
        }

        /* ─────────────── NAVBAR ─────────────── */

                window.addEventListener('scroll', onScroll);
                return () => window.removeEventListener('scroll', onScroll);
            }, []);

                                </div>

                            </div>

                                    Register

                            </div>

                            {/* Mobile hamburger */}
                            <button
                                className="md:hidden p-2 rounded-lg text-gray-600 hover:bg-gray-100"
                                onClick={() => setMenuOpen(!menuOpen)}
                                aria-label="Toggle menu"
                            >
                                <Icon name={menuOpen ? 'X' : 'Menu'} size={22} />
                            </button>
                        </div>

                        {/* Mobile Menu */}
                        {menuOpen && (
                            <div className="md:hidden bg-white border-t border-gray-100 px-4 pb-4 pt-2 flex flex-col gap-2">
                                <button onClick={() => { setMenuOpen(false); onOpenModal('login'); }} className="btn-outline w-full px-5 py-2.5 rounded-lg font-semibold text-sm">

                                    </div>
                                    {/* Floating info badges */}

                                    </div>

                                            transition: 'all 0.25s ease',
                                        }}
                                        className={`cursor-pointer ${hovered ? '' : c.bg} rounded-2xl p-6 flex flex-col items-center gap-3 border border-transparent`}
                                    >
                                        <div
                                            style={{ background: hovered ? 'rgba(255,255,255,0.2)' : 'white' }}
                                            className="w-14 h-14 rounded-xl flex items-center justify-center shadow-sm"
                                        >
                                            <Icon name={c.icon} size={26} className={hovered ? 'text-white' : 'text-gray-600'} />
                                        </div>
                                        <span
                                            className="text-sm font-semibold text-center"
                                            style={{ color: hovered ? 'white' : '#374151', transition: 'color 0.25s ease' }}
                                        >
                                            {c.label}
                                        </span>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </section>
            );
        }

        /* ─────────────── CTA BANNER ─────────────── */
        function CTABanner() {
            const ref = useFadeIn();
            return (
                <section className="py-20" style={{ background: 'linear-gradient(135deg,#1A6B3C 0%,#2E9455 100%)' }}>
                    <div ref={ref} className="section-fade max-w-3xl mx-auto px-4 text-center">
                        <div className="inline-flex items-center gap-2 bg-white/10 text-white rounded-full px-4 py-1.5 text-sm font-semibold mb-6 border border-white/20 backdrop-blur">
                            <Icon name="Sparkles" size={14} className="text-white" />
                            Join thousands of citizens
                        </div>
                        <h2 className="text-3xl sm:text-4xl font-extrabold text-white mb-5">
                            Ready to Fix Your Area?
                        </h2>
                        <p className="text-primary-100 text-lg mb-8 max-w-lg mx-auto">
                            Register in seconds and make your first report today. Together, we can build cleaner, safer communities.
                        </p>
                        <div className="flex flex-wrap gap-3 justify-center">
                            <button className="bg-white text-primary-600 font-bold px-8 py-3.5 rounded-xl hover:bg-primary-50 transition-all duration-200 flex items-center gap-2 hover:-translate-y-1 hover:shadow-xl">
                                <Icon name="UserPlus" size={18} className="text-primary-600" />
                                Get Started Free
                            </button>
                            <button className="bg-white/10 text-white font-bold px-8 py-3.5 rounded-xl border border-white/30 hover:bg-white/20 transition-all duration-200 flex items-center gap-2 hover:-translate-y-1">
                                <Icon name="MapPin" size={18} className="text-white" />
                                Explore the Map
                            </button>
                        </div>
                    </div>
                </section>
            );
        }

        /* ─────────────── FOOTER ─────────────── */
        function Footer() {
            return (
                <footer className="bg-gray-900 text-gray-400 py-12">
                    <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                            {/* Brand */}
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-primary-600 rounded-lg flex items-center justify-center">
                                    <Icon name="MapPin" size={16} className="text-white" />
                                </div>
                                <div>
                                    <span className="text-white font-extrabold text-lg">FixMyArea</span>
                                    <p className="text-gray-500 text-xs">Empowering Citizens, Building Better Cities</p>
                                </div>
                            </div>

                            {/* Links */}
                            <div className="flex gap-6 text-sm">
                                {['About', 'Privacy', 'Terms', 'Contact'].map(l => (
                                    <a key={l} href="#" className="hover:text-primary-400 transition-colors duration-200">{l}</a>
                                ))}
                            </div>

                            {/* Social */}
                            <div className="flex gap-3">
                                {[
                                    { icon: 'Twitter', label: 'Twitter' },
                                    { icon: 'Github', label: 'GitHub' },
                                    { icon: 'Linkedin', label: 'LinkedIn' },
                                ].map(s => (
                                    <a key={s.label} href="#" aria-label={s.label}
                                        className="w-9 h-9 rounded-lg bg-gray-800 hover:bg-primary-600 flex items-center justify-center transition-all duration-200">
                                        <Icon name={s.icon} size={16} className="text-gray-300" />
                                    </a>
                                ))}
                            </div>
                        </div>

                        <div className="border-t border-gray-800 mt-8 pt-6 text-center text-xs text-gray-600">
                            © {new Date().getFullYear()} FixMyArea. All rights reserved. Made with ❤️ for better cities.
                        </div>
                    </div>
                </footer>
            );
        }

        /* ─────────────── AUTH MODAL ─────────────── */
        function AuthModal({ initialView, onClose }) {
            const [view, setView] = useState(initialView); // 'login' | 'register'
            const [success, setSuccess] = useState(false);
            const [form, setForm] = useState({ name: '', email: '', password: '', confirm: '', role: 'citizen' });
            const [errors, setErrors] = useState({});
            const [loading, setLoading] = useState(false);

            const set = (field) => (e) => setForm(f => ({ ...f, [field]: e.target.value }));

            // Close on backdrop click
            const handleBackdrop = (e) => { if (e.target === e.currentTarget) onClose(); };

            // Close on Escape
            useEffect(() => {
                const handler = (e) => { if (e.key === 'Escape') onClose(); };
                document.addEventListener('keydown', handler);
                return () => document.removeEventListener('keydown', handler);
            }, []);

            const switchView = (v) => { setErrors({}); setSuccess(false); setForm({ name: '', email: '', password: '', confirm: '', role: 'citizen' }); setView(v); };

            const validate = () => {
                const e = {};
                if (view === 'register' && !form.name.trim()) e.name = 'Full name is required';
                if (!form.email.trim()) e.email = 'Email is required';
                else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = 'Enter a valid email address';
                if (!form.password) e.password = 'Password is required';
                else if (form.password.length < 6) e.password = 'Min. 6 characters required';
                if (view === 'register') {
                    if (!form.confirm) e.confirm = 'Please confirm your password';
                    else if (form.confirm !== form.password) e.confirm = 'Passwords do not match';
                }
                return e;
            };

            const handleSubmit = (ev) => {
                ev.preventDefault();
                const e = validate();
                if (Object.keys(e).length) { setErrors(e); return; }
                setErrors({});
                setLoading(true);
                setTimeout(() => { setLoading(false); setSuccess(true); }, 1200);
            };

            const isLogin = view === 'login';

            return (
                <div className="modal-backdrop" onClick={handleBackdrop}>
                    <div className="modal-card">
                        {/* X button row — always above everything */}
                        <div className="flex justify-end mb-3 -mt-1">
                            <button
                                onClick={onClose}
                                className="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center transition-colors"
                                aria-label="Close"
                            >
                                <Icon name="X" size={16} className="text-gray-600" />
                            </button>
                        </div>

                        {success ? (
                            /* ── Success ── */
                            <div className="text-center py-4">
                                <div className="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"
                                    style={{ background: 'linear-gradient(135deg,#1A6B3C,#2E9455)' }}>
                                    <Icon name="CheckCheck" size={30} className="text-white" />
                                </div>
                                <h2 className="text-xl font-extrabold text-gray-900 mb-2">
                                    {isLogin ? 'Signed in successfully!' : 'Account created!'}
                                </h2>
                                <p className="text-gray-500 text-sm mb-5">
                                    {isLogin
                                        ? 'Welcome back to FixMyArea. Start tracking your reports.'
                                        : 'Your account is ready. Start reporting civic issues today!'}
                                </p>
                                <button onClick={onClose} className="modal-submit">Back to Home</button>
                            </div>
                        ) : (
                            <>
                                {/* Tab pills */}
                                <div className="flex gap-2 p-1 bg-gray-100 rounded-xl mb-6">
                                    {['login', 'register'].map(v => (
                                        <button key={v} onClick={() => switchView(v)}
                                            className="flex-1 py-2 rounded-lg text-sm font-semibold transition-all duration-200"
                                            style={view === v ? { background: '#1A6B3C', color: 'white', boxShadow: '0 2px 8px rgba(26,107,60,0.2)' } : { background: 'transparent', color: '#6b7280' }}>
                                            {v === 'login' ? 'Login' : 'Register'}
                                        </button>
                                    ))}
                                </div>

                                <div className="mb-5">
                                    <h2 className="text-xl font-extrabold text-gray-900 mb-0.5">
                                        {isLogin ? 'Welcome back' : 'Create an account'}
                                    </h2>
                                    <p className="text-gray-400 text-sm">
                                        {isLogin ? 'Sign in to your FixMyArea account' : 'Join FixMyArea and help improve your city'}
                                    </p>
                                </div>

                                <form onSubmit={handleSubmit} className="space-y-3" noValidate>
                                    {!isLogin && (
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
                                            <div className="relative">
                                                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><Icon name="User" size={15} /></span>
                                                <input type="text" placeholder="Jane Doe" value={form.name} onChange={set('name')}
                                                    className={`auth-field ${errors.name ? 'field-error' : ''}`} />
                                            </div>
                                            {errors.name && <p className="text-xs text-red-500 mt-0.5 flex items-center gap-1"><Icon name="AlertCircle" size={11} className="text-red-400" />{errors.name}</p>}
                                        </div>
                                    )}

                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                                        <div className="relative">
                                            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><Icon name="Mail" size={15} /></span>
                                            <input type="email" placeholder="you@example.com" value={form.email} onChange={set('email')}
                                                className={`auth-field ${errors.email ? 'field-error' : ''}`} />
                                        </div>
                                        {errors.email && <p className="text-xs text-red-500 mt-0.5 flex items-center gap-1"><Icon name="AlertCircle" size={11} className="text-red-400" />{errors.email}</p>}
                                    </div>

                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                                        <div className="relative">
                                            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><Icon name="Lock" size={15} /></span>
                                            <input type="password" placeholder={isLogin ? 'Enter your password' : 'Min. 6 characters'} value={form.password} onChange={set('password')}
                                                className={`auth-field ${errors.password ? 'field-error' : ''}`} />
                                        </div>
                                        {errors.password && <p className="text-xs text-red-500 mt-0.5 flex items-center gap-1"><Icon name="AlertCircle" size={11} className="text-red-400" />{errors.password}</p>}
                                    </div>

                                    {!isLogin && (
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-1">Confirm Password</label>
                                            <div className="relative">
                                                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><Icon name="ShieldCheck" size={15} /></span>
                                                <input type="password" placeholder="Re-enter password" value={form.confirm} onChange={set('confirm')}
                                                    className={`auth-field ${errors.confirm ? 'field-error' : ''}`} />
                                            </div>
                                            {errors.confirm && <p className="text-xs text-red-500 mt-0.5 flex items-center gap-1"><Icon name="AlertCircle" size={11} className="text-red-400" />{errors.confirm}</p>}
                                        </div>
                                    )}


                                    <button type="submit" className="modal-submit !mt-4" disabled={loading}>
                                        {loading
                                            ? <span style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '0.5rem' }}><Icon name="Loader" size={16} className="text-white" style={{ animation: 'spin 1s linear infinite' }} />{isLogin ? 'Signing in…' : 'Creating account…'}</span>
                                            : <span style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '0.5rem' }}><Icon name={isLogin ? 'LogIn' : 'UserPlus'} size={16} className="text-white" />{isLogin ? 'Sign In' : 'Create Account'}</span>
                                        }
                                    </button>
                                </form>

                                <p className="text-center text-sm text-gray-500 mt-4">
                                    {isLogin ? "Don't have an account? " : 'Already have an account? '}
                                    <span className="modal-link" onClick={() => switchView(isLogin ? 'register' : 'login')}>
                                        {isLogin ? 'Register' : 'Login'}
                                    </span>
                                </p>
                            </>
                        )}
                    </div>
                </div >
            );
        }

        /* ─────────────── APP ─────────────── */
        function App() {
            const [modalView, setModalView] = useState(null); // null | 'login' | 'register'

            const openModal = (view) => { setModalView(view); document.body.style.overflow = 'hidden'; };
            const closeModal = () => { setModalView(null); document.body.style.overflow = ''; };

            return (
                <>
                    <Navbar onOpenModal={openModal} />
                    <main>
                        <Hero />
                        <HowItWorks />
                        <Features />
                        <IssueCategories />
                        <CTABanner />
                    </main>
                    <Footer />
                    {modalView && <AuthModal initialView={modalView} onClose={closeModal} />}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
