<!DOCTYPE html>

    <script>
        tailwind.config = {

                    colors: {

                            DEFAULT: '#1A6B3C',

                            100: '#C5E6D2',

        }

        .hero-gradient {

        .btn-outline:hover {

        }

        .step-connector::after {
            content: '';
            position: absolute;
            top: 28px;

        .status-badge {

            padding: 0.45rem 0.9rem;
            border: 1.5px solid #e5e7eb;

<body class="bg-white text-gray-800 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /* ── tiny lucide helper ── */
        function Icon({ name, size = 24, className = '' }) {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    ref.current.innerHTML = '';
                    const icon = lucide.createElement(lucide[name] || lucide['Circle']);
                    icon.setAttribute('width', size);
                    icon.setAttribute('height', size);
                    ref.current.appendChild(icon);
                }
            }, [name, size]);
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} />;
        }

        /* ── intersection observer hook ── */
        function useFadeIn() {
            const ref = useRef(null);
            useEffect(() => {
                const el = ref.current;
                if (!el) return;
                const obs = new IntersectionObserver(
                    ([entry]) => { if (entry.isIntersecting) { el.classList.add('visible'); obs.disconnect(); } },
                    { threshold: 0.15 }
                );
                obs.observe(el);
                return () => obs.disconnect();
            }, []);
            return ref;
        }

        /* ─────────────── NAVBAR ─────────────── */
        function Navbar({ onOpenModal }) {
            const [scrolled, setScrolled] = useState(false);
            const [menuOpen, setMenuOpen] = useState(false);

            useEffect(() => {
                const onScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', onScroll);
                return () => window.removeEventListener('scroll', onScroll);
            }, []);

            return (
                <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled ? 'bg-white/95 backdrop-blur-md shadow-md' : 'bg-transparent'
                    }`}>
                    <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex items-center justify-between h-16">
                            {/* Logo */}
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-primary-600 rounded-lg flex items-center justify-center shadow-sm">
                                    <Icon name="MapPin" size={18} className="text-white" />
                                </div>
                                <span className="text-xl font-800 font-bold tracking-tight text-primary-600">
                                    FixMyArea
                                </span>
                            </div>

                            {/* Desktop Buttons */}
                            <div className="hidden md:flex items-center gap-3">
                                <button onClick={() => onOpenModal('login')} className="btn-outline px-5 py-2 rounded-lg font-semibold text-sm">
                                    Login
                                </button>
                                <button onClick={() => onOpenModal('register')} className="btn-primary text-white px-5 py-2 rounded-lg font-semibold text-sm">
                                    Register
                                </button>
                            </div>

                            {/* Mobile hamburger */}
                            <button
                                className="md:hidden p-2 rounded-lg text-gray-600 hover:bg-gray-100"
                                onClick={() => setMenuOpen(!menuOpen)}
                                aria-label="Toggle menu"
                            >
                                <Icon name={menuOpen ? 'X' : 'Menu'} size={22} />
                            </button>
                        </div>

                        {/* Mobile Menu */}
                        {menuOpen && (
                            <div className="md:hidden bg-white border-t border-gray-100 px-4 pb-4 pt-2 flex flex-col gap-2">
                                <button onClick={() => { setMenuOpen(false); onOpenModal('login'); }} className="btn-outline w-full px-5 py-2.5 rounded-lg font-semibold text-sm">
                                    Login
                                </button>
                                <button onClick={() => { setMenuOpen(false); onOpenModal('register'); }} className="btn-primary text-white w-full px-5 py-2.5 rounded-lg font-semibold text-sm">
                                    Register
                                </button>
                            </div>
                        )}
                    </div>
                </nav>
            );
        }

        /* ─────────────── HERO ─────────────── */
        function Hero({ onOpenReport, onOpenIssues }) {
            return (
                <section className="hero-gradient min-h-screen flex items-center pt-16">
                    <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-20 lg:py-28 grid lg:grid-cols-2 gap-12 items-center">
                        {/* Text */}
                        <div>
                            <div className="inline-flex items-center gap-2 bg-primary-50 text-primary-600 rounded-full px-4 py-1.5 text-sm font-semibold mb-6 border border-primary-100">
                                <Icon name="Zap" size={14} className="text-primary-500" />
                                AI-Powered Civic Tech
                            </div>
                            <h1 className="text-4xl sm:text-5xl lg:text-6xl font-black leading-tight text-gray-900 mb-6">
                                Fix Your City.<br />
                                <span style={{ color: '#1A6B3C' }}>One Report</span><br />
                                at a Time.
                            </h1>
                            <p className="text-lg text-gray-500 leading-relaxed mb-8 max-w-md">
                                FixMyArea uses AI to validate and route citizen reports — potholes, garbage, broken lights, water leaks — directly to the right local authorities. Faster. Smarter.
                            </p>
                            <div className="flex flex-wrap gap-3">
                                <button onClick={onOpenReport} className="btn-primary text-white px-7 py-3.5 rounded-xl font-bold text-base flex items-center gap-2">
                                    <Icon name="AlertCircle" size={18} className="text-white" />

                                <button onClick={onOpenIssues} className="btn-outline px-7 py-3.5 rounded-xl font-bold text-base flex items-center gap-2">
                                    <Icon name="PlayCircle" size={18} />
                                    Browse Issues
                                </button>
                            </div>
                            <div className="mt-10 flex items-center gap-6">
                                <div className="text-center">
                                    <p className="text-2xl font-extrabold text-gray-900">12K+</p>
                                    <p className="text-xs text-gray-400 font-medium">Issues Resolved</p>
                                </div>
                                <div className="w-px h-10 bg-gray-200"></div>
                                <div className="text-center">
                                    <p className="text-2xl font-extrabold text-gray-900">98%</p>
                                    <p className="text-xs text-gray-400 font-medium">AI Accuracy</p>
                                </div>
                                <div className="w-px h-10 bg-gray-200"></div>
                                <div className="text-center">
                                    <p className="text-2xl font-extrabold text-gray-900">200+</p>
                                    <p className="text-xs text-gray-400 font-medium">Municipalities</p>
                                </div>
                            </div>
                        </div>

                        {/* Illustration Card */}
                        <div className="relative hidden lg:flex justify-center">
                            <div className="relative w-80 h-80">
                                {/* Map mock */}
                                <div className="absolute inset-0 bg-primary-50 rounded-3xl border-2 border-primary-100 overflow-hidden shadow-2xl">
                                    {/* Grid lines */}
                                    <div className="absolute inset-0 opacity-20" style={{
                                        backgroundImage: 'linear-gradient(#1A6B3C 1px, transparent 1px), linear-gradient(90deg, #1A6B3C 1px, transparent 1px)',
                                        backgroundSize: '40px 40px'
                                    }} />
                                    {/* Roads */}
                                    <div className="absolute top-1/2 left-0 right-0 h-3 bg-white/70 -translate-y-1/2"></div>
                                    <div className="absolute left-1/2 top-0 bottom-0 w-3 bg-white/70 -translate-x-1/2"></div>
                                    {/* Center pin */}
                                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2
                                  w-12 h-12 bg-primary-600 rounded-full flex items-center justify-center
                                  shadow-lg ring-4 ring-primary-200">
                                        <Icon name="MapPin" size={22} className="text-white" />
                                    </div>
                                    {/* Floating info badges */}
                                    <div className="floating-badge absolute top-6 right-6 bg-white rounded-xl px-3 py-2 shadow-lg border border-gray-100 flex items-center gap-2">
                                        <span className="w-2 h-2 rounded-full bg-green-500 inline-block animate-pulse"></span>
                                        <span className="text-xs font-semibold text-gray-700">Issue Resolved</span>
                                    </div>
                                    <div className="absolute bottom-6 left-6 bg-white rounded-xl px-3 py-2 shadow-lg border border-gray-100 flex items-center gap-2"
                                        style={{ animation: 'float 3.5s ease-in-out 0.8s infinite' }}>
                                        <Icon name="Brain" size={14} className="text-primary-600" />
                                        <span className="text-xs font-semibold text-gray-700">AI Validated ✓</span>
                                    </div>
                                    <div className="absolute top-16 left-5 bg-yellow-400 rounded-full w-5 h-5 flex items-center justify-center shadow-md"
                                        style={{ animation: 'float 4s ease-in-out 0.3s infinite' }}>
                                        <Icon name="AlertTriangle" size={11} className="text-yellow-900" />
                                    </div>
                                    <div className="absolute bottom-16 right-8 bg-red-400 rounded-full w-5 h-5 flex items-center justify-center shadow-md"
                                        style={{ animation: 'float 3.8s ease-in-out 1s infinite' }}>
                                        <Icon name="Droplets" size={11} className="text-white" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        }

        /* ─────────────── HOW IT WORKS ─────────────── */
        function HowItWorks() {
            const ref = useFadeIn();
            const steps = [
                {
                    number: '01',
                    icon: 'FileText',
                    title: 'Submit a Report',

        /* ─────────────── AUTH MODAL ─────────────── */
        function AuthModal({ initialView, onClose }) {
            const [view, setView] = useState(initialView); // 'login' | 'register'
            const [success, setSuccess] = useState(false);
            const [form, setForm] = useState({ name: '', email: '', password: '', confirm: '', role: 'citizen' });
            const [errors, setErrors] = useState({});
            const [loading, setLoading] = useState(false);

            const set = (field) => (e) => setForm(f => ({ ...f, [field]: e.target.value }));

            // Close on backdrop click
            const handleBackdrop = (e) => { if (e.target === e.currentTarget) onClose(); };

            // Close on Escape
            useEffect(() => {
                const handler = (e) => { if (e.key === 'Escape') onClose(); };
                document.addEventListener('keydown', handler);
                return () => document.removeEventListener('keydown', handler);
            }, []);

            const switchView = (v) => { setErrors({}); setSuccess(false); setForm({ name: '', email: '', password: '', confirm: '', role: 'citizen' }); setView(v); };

            const validate = () => {
                const e = {};
                if (view === 'register' && !form.name.trim()) e.name = 'Full name is required';
                if (!form.email.trim()) e.email = 'Email is required';
                else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = 'Enter a valid email address';
                if (!form.password) e.password = 'Password is required';
                else if (form.password.length < 6) e.password = 'Min. 6 characters required';
                if (view === 'register') {
                    if (!form.confirm) e.confirm = 'Please confirm your password';
                    else if (form.confirm !== form.password) e.confirm = 'Passwords do not match';
                }
                return e;
            };

            const handleSubmit = (ev) => {
                ev.preventDefault();
                const e = validate();
                if (Object.keys(e).length) { setErrors(e); return; }
                setErrors({});
                setLoading(true);
                setTimeout(() => { setLoading(false); setSuccess(true); }, 1200);
            };

            const isLogin = view === 'login';

            return (
                <div className="modal-backdrop" onClick={handleBackdrop}>
                    <div className="modal-card">
                        {/* X button row — always above everything */}
                        <div className="flex justify-end mb-3 -mt-1">

                                        {isLogin ? 'Sign in to your FixMyArea account' : 'Join FixMyArea and help improve your city'}

                                <form onSubmit={handleSubmit} className="space-y-3" noValidate>
                                    {!isLogin && (

        /* ─────────────── REPORT MODAL ─────────────── */
        const CATEGORIES = [
            { key: 'pothole', label: 'Pothole', icon: 'TriangleAlert' },

            { key: 'light', label: 'Street Light', icon: 'Lightbulb' },
            { key: 'water', label: 'Water Leak', icon: 'Droplets' },
            { key: 'road', label: 'Road Damage', icon: 'Construction' },
            { key: 'property', label: 'Public Property', icon: 'Building2' },
        ];

        function ReportModal({ onClose }) {
            const [step, setStep] = useState(1);
            const [submitted, setSubmitted] = useState(false);
            const [isDrag, setIsDrag] = useState(false);
            const [data, setData] = useState({
                title: '', category: '', description: '',
                photo: null, photoName: '', location: '',
            });
            const [errors, setErrors] = useState({});
            const fileRef = useRef(null);

            // Escape key
            useEffect(() => {
                const h = (e) => { if (e.key === 'Escape') onClose(); };
                document.addEventListener('keydown', h);
                return () => document.removeEventListener('keydown', h);
            }, []);

            const set = (f, v) => setData(d => ({ ...d, [f]: v }));

            const handleFile = (file) => {
                if (!file || !file.type.startsWith('image/')) return;
                const reader = new FileReader();
                reader.onload = (e) => set('photo', e.target.result);
                reader.readAsDataURL(file);
                set('photoName', file.name);
            };

            const useLocation = () => {
                if (!navigator.geolocation) { set('location', 'Geolocation not supported'); return; }
                set('location', 'Detecting location…');
                navigator.geolocation.getCurrentPosition(
                    (pos) => set('location', `Lat ${pos.coords.latitude.toFixed(5)}, Lng ${pos.coords.longitude.toFixed(5)}`),
                    () => set('location', 'Location access denied')
                );
            };

            const validateStep1 = () => {
                const e = {};
                if (!data.title.trim()) e.title = 'Issue title is required';
                if (!data.category) e.category = 'Please select a category';
                if (!data.description.trim()) e.description = 'Description is required';
                return e;
            };

            const validateStep2 = () => {
                const e = {};
                if (!data.location.trim()) e.location = 'Please enter or detect your location';
                return e;
            };

            const nextStep = () => {
                if (step === 1) {
                    const e = validateStep1();
                    if (Object.keys(e).length) { setErrors(e); return; }
                }
                if (step === 2) {
                    const e = validateStep2();
                    if (Object.keys(e).length) { setErrors(e); return; }
                }
                setErrors({});
                setStep(s => s + 1);
            };

            const catObj = CATEGORIES.find(c => c.key === data.category);
            const progress = submitted ? 100 : ((step - 1) / 2) * 100;

            return (
                <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
                    <div className="modal-card-wide">

                        {/* Header */}
                        <div className="flex items-center justify-between mb-4">

                                <h2 className="text-lg font-extrabold text-gray-900">
                                    {submitted ? 'Report Submitted!' : `Report an Issue`}
                                </h2>
                                {!submitted && <p className="text-xs text-gray-400 mt-0.5">Step {step} of 3</p>}
                            </div>
                            <button onClick={onClose} className="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center transition-colors" aria-label="Close">
                                <Icon name="X" size={16} className="text-gray-600" />
                            </button>
                        </div>

                        {/* Progress bar */}
                        {!submitted && (
                            <div className="mb-6">
                                <div className="report-progress-bar">
                                    <div className="report-progress-fill" style={{ width: `${((step - 1) / 2) * 100}%` }} />
                                </div>
                                <div className="flex justify-between mt-2">
                                    {['Issue Details', 'Photo & Location', 'Review & Submit'].map((label, i) => (
                                        <span key={i} className="text-xs font-semibold" style={{ color: step >= i + 1 ? '#1A6B3C' : '#9ca3af' }}>
                                            {label}
                                        </span>
                                    ))}
                                </div>

                            <div className="report-step text-center py-6">
                                <div className="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-5"
                                    style={{ background: 'linear-gradient(135deg,#1A6B3C,#2E9455)' }}>
                                    <Icon name="CheckCheck" size={38} className="text-white" />
                                </div>
                                <p className="text-xl font-extrabold text-gray-900 mb-2">Report submitted!</p>
                                <p className="text-gray-500 text-sm mb-6">You will be notified when the status updates.</p>
                                <div className="bg-primary-50 border border-primary-100 rounded-xl px-4 py-3 mb-6 flex items-center gap-3">
                                    <Icon name="Brain" size={20} className="text-primary-600" />
                                    <span className="text-sm text-primary-700 font-medium">Your report is now being reviewed by our AI system.</span>
                                </div>
                                <button onClick={onClose} className="modal-submit">Back to Home</button>
                            </div>
                        )}

                        {/* ── STEP 1 ── */}
                        {!submitted && step === 1 && (
                            <div className="report-step space-y-4">
                                {/* Title */}
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-1">Issue Title</label>
                                    <div className="relative">
                                        <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><Icon name="FileText" size={15} /></span>
                                        <input
                                            type="text"
                                            placeholder="e.g. Large pothole on MG Road"
                                            value={data.title}
                                            onChange={e => set('title', e.target.value)}
                                            className={`auth-field ${errors.title ? 'field-error' : ''}`}
                                        />
                                    </div>
                                    {errors.title && <p className="text-xs text-red-500 mt-0.5 flex items-center gap-1"><Icon name="AlertCircle" size={11} className="text-red-400" />{errors.title}</p>}
                                </div>

                                {/* Category */}
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Category</label>
                                    <div className="grid grid-cols-3 gap-2">
                                        {CATEGORIES.map(c => (
                                            <button
                                                key={c.key}
                                                type="button"
                                                onClick={() => set('category', c.key)}
                                                className={`cat-pick ${data.category === c.key ? 'selected' : ''}`}
                                            >
                                                <Icon name={c.icon} size={20} className={data.category === c.key ? 'text-white' : 'text-gray-500'} />
                                                {c.label}
                                            </button>
                                        ))}
                                    </div>
                                    {errors.category && <p className="text-xs text-red-500 mt-1 flex items-center gap-1"><Icon name="AlertCircle" size={11} className="text-red-400" />{errors.category}</p>}
                                </div>

                                {/* Description */}
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-1">Description</label>
                                    <textarea
                                        placeholder="Describe the issue in detail…"
                                        value={data.description}
                                        onChange={e => set('description', e.target.value)}
                                        className={`report-textarea ${errors.description ? 'field-error' : ''}`}
                                    />
                                    {errors.description && <p className="text-xs text-red-500 mt-0.5 flex items-center gap-1"><Icon name="AlertCircle" size={11} className="text-red-400" />{errors.description}</p>}
                                </div>

                                <button onClick={nextStep} className="modal-submit flex items-center justify-center gap-2">
                                    Next <Icon name="ArrowRight" size={16} className="text-white" />
                                </button>
                            </div>
                        )}

                        {/* ── STEP 2 ── */}
                        {!submitted && step === 2 && (
                            <div className="report-step space-y-4">
                                {/* Drop zone */}
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Photo (optional)</label>
                                    <div
                                        className={`drop-zone ${isDrag ? 'drag-over' : ''}`}
                                        onClick={() => fileRef.current.click()}
                                        onDragOver={(e) => { e.preventDefault(); setIsDrag(true); }}
                                        onDragLeave={() => setIsDrag(false)}
                                        onDrop={(e) => { e.preventDefault(); setIsDrag(false); handleFile(e.dataTransfer.files[0]); }}
                                    >
                                        {data.photo ? (
                                            <div className="flex flex-col items-center gap-2">
                                                <img src={data.photo} alt="preview" className="w-full max-h-40 object-cover rounded-lg" />
                                                <span className="text-xs text-gray-500">{data.photoName}</span>
                                                <span className="text-xs text-primary-600 font-semibold">Click to change</span>
                                            </div>
                                        ) : (
                                            <div className="flex flex-col items-center gap-2 text-gray-400">
                                                <Icon name="Upload" size={32} className="text-gray-300" />
                                                <p className="text-sm font-medium text-gray-500">Drag & drop or <span className="text-primary-600 font-semibold">click to upload</span></p>
                                                <p className="text-xs text-gray-400">PNG, JPG, WEBP up to 10MB</p>
                                            </div>
                                        )}
                                    </div>
                                    <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={e => handleFile(e.target.files[0])} />
                                </div>

                                {/* Location */}
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-1">Location</label>
                                    <div className="flex gap-2">
                                        <div className="relative flex-1">
                                            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><Icon name="MapPin" size={15} /></span>
                                            <input
                                                type="text"
                                                placeholder="Enter area or street name"
                                                value={data.location}
                                                onChange={e => set('location', e.target.value)}
                                                className={`auth-field ${errors.location ? 'field-error' : ''}`}
                                            />
                                        </div>
                                        <button
                                            type="button"
                                            onClick={useLocation}
                                            className="flex items-center gap-1.5 px-3 py-2 rounded-xl border-2 border-primary-600 text-primary-600 font-semibold text-xs hover:bg-primary-50 transition-colors whitespace-nowrap"
                                        >
                                            <Icon name="LocateFixed" size={14} className="text-primary-600" />
                                            Use My Location
                                        </button>
                                    </div>
                                    {errors.location && <p className="text-xs text-red-500 mt-0.5 flex items-center gap-1"><Icon name="AlertCircle" size={11} className="text-red-400" />{errors.location}</p>}
                                </div>

                                <div className="flex gap-3 pt-1">
                                    <button onClick={() => setStep(1)} className="flex-1 py-2.5 rounded-xl border-2 border-gray-200 text-gray-600 font-semibold text-sm hover:bg-gray-50 transition-colors flex items-center justify-center gap-1">
                                        <Icon name="ArrowLeft" size={15} className="text-gray-500" /> Back
                                    </button>
                                    <button onClick={nextStep} className="flex-1 modal-submit flex items-center justify-center gap-1.5">
                                        Next <Icon name="ArrowRight" size={15} className="text-white" />
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* ── STEP 3 — REVIEW ── */}
                        {!submitted && step === 3 && (
                            <div className="report-step space-y-4">
                                <div className="bg-gray-50 rounded-2xl p-4 space-y-3 border border-gray-100">
                                    <h3 className="text-sm font-bold text-gray-700 mb-2">Report Summary</h3>

                                    <div className="flex gap-2">
                                        <span className="text-gray-400 w-24 text-xs font-semibold shrink-0 pt-0.5">Title</span>
                                        <span className="text-sm text-gray-800 font-medium">{data.title}</span>
                                    </div>
                                    <div className="flex gap-2">
                                        <span className="text-gray-400 w-24 text-xs font-semibold shrink-0 pt-0.5">Category</span>
                                        {catObj && (
                                            <span className="inline-flex items-center gap-1.5 text-sm text-gray-800 font-medium">
                                                <Icon name={catObj.icon} size={14} className="text-primary-600" />
                                                {catObj.label}
                                            </span>
                                        )}
                                    </div>
                                    <div className="flex gap-2">
                                        <span className="text-gray-400 w-24 text-xs font-semibold shrink-0 pt-0.5">Description</span>
                                        <span className="text-sm text-gray-700 leading-relaxed">{data.description}</span>
                                    </div>
                                    <div className="flex gap-2">
                                        <span className="text-gray-400 w-24 text-xs font-semibold shrink-0 pt-0.5">Location</span>
                                        <span className="text-sm text-gray-800 font-medium">{data.location}</span>
                                    </div>
                                    {data.photo && (
                                        <div className="flex gap-2">
                                            <span className="text-gray-400 w-24 text-xs font-semibold shrink-0 pt-0.5">Photo</span>
                                            <img src={data.photo} alt="preview" className="w-32 h-20 object-cover rounded-lg border border-gray-200" />
                                        </div>
                                    )}
                                </div>

                                {/* AI notice */}
                                <div className="flex items-start gap-3 bg-primary-50 border border-primary-100 rounded-xl px-4 py-3">
                                    <Icon name="Brain" size={18} className="text-primary-600 mt-0.5 shrink-0" />
                                    <p className="text-sm text-primary-700 leading-snug">
                                        <span className="font-bold">AI Validation: </span>
                                        Your report will be reviewed by our AI before going live to ensure accuracy and prevent duplicates.
                                    </p>
                                </div>

                                <div className="flex gap-3 pt-1">
                                    <button onClick={() => setStep(2)} className="flex-1 py-2.5 rounded-xl border-2 border-gray-200 text-gray-600 font-semibold text-sm hover:bg-gray-50 transition-colors flex items-center justify-center gap-1">
                                        <Icon name="ArrowLeft" size={15} className="text-gray-500" /> Back
                                    </button>
                                    <button
                                        onClick={() => { setErrors({}); setSubmitted(true); }}
                                        className="flex-1 modal-submit flex items-center justify-center gap-1.5"
                                    >
                                        <Icon name="Send" size={15} className="text-white" /> Submit Report
                                    </button>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        /* ─────────────── VIEW ISSUES PAGE ─────────────── */
        const ISSUES = [
            { id: 1, title: 'Large pothole on MG Road', category: 'Pothole', catIcon: 'TriangleAlert', status: 'Pending', date: '2026-03-01', location: 'MG Road, Bengaluru', votes: 14, x: 18, y: 28 },
            { id: 2, title: 'Overflowing bin near City Park', category: 'Garbage', catIcon: 'Trash2', status: 'In Progress', date: '2026-03-03', location: 'City Park Gate, Pune', votes: 27, x: 58, y: 52 },
            { id: 3, title: 'Street light out for 3 weeks', category: 'Street Light', catIcon: 'Lightbulb', status: 'Resolved', date: '2026-02-22', location: 'Infantry Road, Bengaluru', votes: 9, x: 80, y: 22 },
            { id: 4, title: 'Water leak flooding the pavement', category: 'Water Leak', catIcon: 'Droplets', status: 'Pending', date: '2026-03-05', location: 'Nehru Nagar, Chennai', votes: 31, x: 35, y: 68 },
            { id: 5, title: 'Deep cracks on the main highway', category: 'Road Damage', catIcon: 'Construction', status: 'In Progress', date: '2026-03-07', location: 'NH-48, Mumbai', votes: 42, x: 65, y: 78 },
            { id: 6, title: 'Broken gate in community garden', category: 'Public Property', catIcon: 'Building2', status: 'Resolved', date: '2026-02-28', location: 'Sector 12, Hyderabad', votes: 6, x: 48, y: 38 },
        ];

        const STATUS_COLOR = {
            'Pending': { dot: '#ef4444', bg: '#fef2f2', text: '#dc2626' },
            'In Progress': { dot: '#f97316', bg: '#fff7ed', text: '#ea580c' },
            'Resolved': { dot: '#16a34a', bg: '#f0fdf4', text: '#15803d' },
        };

        function ViewIssues({ onBack }) {
            const [tab, setTab] = useState('map');   // 'map' | 'list'
            const [openPin, setOpenPin] = useState(null);    // issue id
            const [catFilter, setCatFilter] = useState('');
            const [statusFilter, setStatusFilter] = useState('');
            const [votes, setVotes] = useState(() => Object.fromEntries(ISSUES.map(i => [i.id, i.votes])));
            const [voted, setVoted] = useState({});

            const toggleVote = (id) => {
                setVoted(v => {
                    const now = !v[id];
                    setVotes(vv => ({ ...vv, [id]: vv[id] + (now ? 1 : -1) }));
                    return { ...v, [id]: now };
                });
            };

            const filtered = ISSUES.filter(i =>
                (!catFilter || i.category === catFilter) &&
                (!statusFilter || i.status === statusFilter)
            );

            const catOptions = [...new Set(ISSUES.map(i => i.category))];

            return (
                <div className="issues-page">
                    {/* Top bar */}
                    <div className="sticky top-16 z-40 bg-white border-b border-gray-100 shadow-sm">
                        <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex items-center justify-between gap-4 flex-wrap">
                            <div className="flex items-center gap-3">
                                <button
                                    onClick={onBack}
                                    className="flex items-center gap-1.5 px-3 py-2 rounded-lg border-2 border-gray-200 text-gray-600 font-semibold text-sm hover:bg-gray-50 transition-colors"
                                >
                                    <Icon name="ArrowLeft" size={16} className="text-gray-500" /> Back
                                </button>
                                <h1 className="text-lg font-extrabold text-gray-900">Issue Tracker</h1>
                            </div>
                            <div className="flex items-center gap-2 p-1 bg-gray-100 rounded-xl">
                                <button onClick={() => setTab('map')} className={`issues-tab ${tab === 'map' ? 'active' : 'inactive'}`}>
                                    <span className="flex items-center gap-1.5"><Icon name="Map" size={14} className={tab === 'map' ? 'text-white' : 'text-gray-500'} />Map View</span>
                                </button>
                                <button onClick={() => setTab('list')} className={`issues-tab ${tab === 'list' ? 'active' : 'inactive'}`}>
                                    <span className="flex items-center gap-1.5"><Icon name="List" size={14} className={tab === 'list' ? 'text-white' : 'text-gray-500'} />List View</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

                        {/* ── MAP TAB ── */}
                        {tab === 'map' && (
                            <div>
                                <p className="text-sm text-gray-500 mb-4">Click any pin to see issue details.</p>
                                <div className="sim-map" onClick={() => setOpenPin(null)}>
                                    {/* Street grid lines */}
                                    <svg width="100%" height="100%" style={{ position: 'absolute', inset: 0, opacity: 0.25 }}>
                                        {/* Horizontal streets */}
                                        {[15, 30, 45, 60, 75, 90].map(y => (
                                            <line key={`h${y}`} x1="0" y1={`${y}%`} x2="100%" y2={`${y}%`} stroke="#1A6B3C" strokeWidth="1.5" strokeDasharray="6 4" />
                                        ))}
                                        {/* Vertical streets */}
                                        {[12, 25, 38, 52, 65, 78, 90].map(x => (
                                            <line key={`v${x}`} x1={`${x}%`} y1="0" x2={`${x}%`} y2="100%" stroke="#1A6B3C" strokeWidth="1.5" strokeDasharray="6 4" />
                                        ))}
                                        {/* Main roads (thicker) */}
                                        <line x1="0" y1="50%" x2="100%" y2="50%" stroke="#1A6B3C" strokeWidth="3" />
                                        <line x1="50%" y1="0" x2="50%" y2="100%" stroke="#1A6B3C" strokeWidth="3" />
                                        {/* Diagonal connector */}
                                        <line x1="0" y1="100%" x2="100%" y2="0" stroke="#2E9455" strokeWidth="1.5" strokeDasharray="8 5" opacity="0.5" />
                                    </svg>
                                    {/* Map label */}
                                    <div style={{ position: 'absolute', bottom: 12, right: 14, background: 'white', borderRadius: '0.5rem', padding: '4px 10px', fontSize: '0.7rem', fontWeight: 700, color: '#1A6B3C', border: '1px solid #c3e6d0', opacity: 0.85 }}>
                                        FixMyArea City Map
                                    </div>

                                    {/* Pins */}
                                    {ISSUES.map(issue => {
                                        const sc = STATUS_COLOR[issue.status];
                                        return (
                                            <div key={issue.id}>
                                                <div
                                                    className="map-pin"
                                                    style={{ background: sc.dot, left: `${issue.x}%`, top: `${issue.y}%`, transform: 'translate(-50%,-50%)' }}
                                                    onClick={(e) => { e.stopPropagation(); setOpenPin(openPin === issue.id ? null : issue.id); }}
                                                    title={issue.title}
                                                />
                                                {openPin === issue.id && (
                                                    <div
                                                        className="pin-popup"
                                                        style={{
                                                            left: `${Math.min(issue.x, 68)}%`,
                                                            top: `${issue.y > 60 ? issue.y - 30 : issue.y + 5}%`,
                                                        }}
                                                        onClick={e => e.stopPropagation()}
                                                    >
                                                        <p className="font-bold text-gray-900 text-sm mb-1 leading-snug">{issue.title}</p>
                                                        <div className="flex items-center gap-1.5 mb-1">
                                                            <Icon name={issue.catIcon} size={13} className="text-gray-500" />
                                                            <span className="text-xs text-gray-500">{issue.category}</span>
                                                        </div>
                                                        <span
                                                            className="status-badge"
                                                            style={{ background: sc.bg, color: sc.text }}
                                                        >
                                                            <span style={{ width: 6, height: 6, borderRadius: '50%', background: sc.dot, display: 'inline-block' }}></span>
                                                            {issue.status}
                                                        </span>
                                                        <p className="text-xs text-gray-400 mt-1.5">{issue.date}</p>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>

                                {/* Legend */}
                                <div className="flex gap-4 mt-4">
                                    {Object.entries(STATUS_COLOR).map(([s, c]) => (
                                        <div key={s} className="flex items-center gap-1.5">
                                            <span style={{ width: 12, height: 12, borderRadius: '50%', background: c.dot, display: 'inline-block', border: '2px solid white', boxShadow: '0 1px 4px rgba(0,0,0,0.2)' }}></span>
                                            <span className="text-xs font-semibold text-gray-500">{s}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* ── LIST TAB ── */}
                        {tab === 'list' && (
                            <div>
                                {/* Filter bar */}
                                <div className="flex gap-3 mb-5 flex-wrap items-center">
                                    <Icon name="Filter" size={16} className="text-gray-400" />
                                    <select value={catFilter} onChange={e => setCatFilter(e.target.value)} className="filter-select">
                                        <option value="">All Categories</option>
                                        {catOptions.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                    <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} className="filter-select">
                                        <option value="">All Statuses</option>
                                        {['Pending', 'In Progress', 'Resolved'].map(s => <option key={s} value={s}>{s}</option>)}
                                    </select>
                                    {(catFilter || statusFilter) && (
                                        <button onClick={() => { setCatFilter(''); setStatusFilter(''); }} className="text-xs font-semibold text-primary-600 hover:underline">
                                            Clear filters
                                        </button>
                                    )}
                                    <span className="ml-auto text-xs text-gray-400 font-medium">{filtered.length} issue{filtered.length !== 1 ? 's' : ''}</span>
                                </div>

                                {/* Cards */}
                                {filtered.length === 0 ? (
                                    <div className="text-center py-16 text-gray-400">
                                        <Icon name="SearchX" size={36} className="text-gray-200 mb-3" />
                                        <p className="font-semibold">No issues match your filters.</p>
                                    </div>
                                ) : (
                                    <div className="grid sm:grid-cols-2 gap-4">
                                        {filtered.map(issue => {
                                            const sc = STATUS_COLOR[issue.status];
                                            return (
                                                <div key={issue.id} className="issue-card">
                                                    <div className="flex items-start justify-between gap-2 mb-2">
                                                        <p className="font-bold text-gray-900 text-sm leading-snug">{issue.title}</p>
                                                        <span
                                                            className="status-badge shrink-0"
                                                            style={{ background: sc.bg, color: sc.text }}
                                                        >
                                                            <span style={{ width: 6, height: 6, borderRadius: '50%', background: sc.dot, display: 'inline-block' }}></span>
                                                            {issue.status}
                                                        </span>
                                                    </div>
                                                    <div className="flex items-center gap-1.5 text-xs text-gray-500 mb-1">
                                                        <Icon name={issue.catIcon} size={13} className="text-gray-400" />
                                                        <span className="font-semibold" style={{ color: '#1A6B3C' }}>{issue.category}</span>
                                                    </div>
                                                    <div className="flex items-center gap-1 text-xs text-gray-400 mb-1">
                                                        <Icon name="MapPin" size={12} className="text-gray-300" />
                                                        {issue.location}
                                                    </div>
                                                    <div className="flex items-center gap-1 text-xs text-gray-400 mb-3">
                                                        <Icon name="Calendar" size={12} className="text-gray-300" />
                                                        {issue.date}
                                                    </div>
                                                    <button
                                                        className={`upvote-btn ${voted[issue.id] ? 'voted' : ''}`}
                                                        onClick={() => toggleVote(issue.id)}
                                                    >
                                                        <Icon name="ArrowBigUp" size={15} className={voted[issue.id] ? 'text-primary-600' : 'text-gray-400'} />
                                                        {votes[issue.id]}
                                                    </button>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        /* ─────────────── APP ─────────────── */
        function App() {
            const [modalView, setModalView] = useState(null);  // null | 'login' | 'register'
            const [reportOpen, setReportOpen] = useState(false);
            const [issuesOpen, setIssuesOpen] = useState(false);

            const openModal = (view) => { setModalView(view); document.body.style.overflow = 'hidden'; };
            const closeModal = () => { setModalView(null); document.body.style.overflow = ''; };
            const openReport = () => { setReportOpen(true); document.body.style.overflow = 'hidden'; };
            const closeReport = () => { setReportOpen(false); document.body.style.overflow = ''; };
            const openIssues = () => { setIssuesOpen(true); window.scrollTo(0, 0); };
            const closeIssues = () => { setIssuesOpen(false); };

            if (issuesOpen) {
                return (
                    <>
                        <Navbar onOpenModal={openModal} />
                        <ViewIssues onBack={closeIssues} />
                    </>
                );
            }

            return (
                <>
                    <Navbar onOpenModal={openModal} />
                    <main>
                        <Hero onOpenReport={openReport} onOpenIssues={openIssues} />
                        <HowItWorks />
                        <Features />
                        <IssueCategories />
                        <CTABanner onOpenIssues={openIssues} />
                    </main>
                    <Footer />
                    {modalView && <AuthModal initialView={modalView} onClose={closeModal} />}
                    {reportOpen && <ReportModal onClose={closeReport} />}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
